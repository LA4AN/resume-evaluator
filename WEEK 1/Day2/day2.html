<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectors Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <h1 id="lesson-title" class="title-accent">Selectors in Action</h1>

      <section class="alert-card">
        <p class="notice">This paragraph will be used for specificity checks.</p>
      </section>

      <section class="inheritance-panel">
        <h2>Inherited text styles</h2>
        <p>Open DevTools and inspect how font and color flow from the parent.</p>
      </section>

      <table>
        <thead>
          <tr>
            <th>Selector</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>tag</td>
            <td>Styles every matching element</td>
          </tr>
          <tr>
            <td>class</td>
            <td>Reusable and easy to combine</td>
          </tr>
          <tr>
            <td>ID</td>
            <td>Highly specific</td>
          </tr>
          <tr>
            <td>pseudo-class</td>
            <td>Targets a state</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
