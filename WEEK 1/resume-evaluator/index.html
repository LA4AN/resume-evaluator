<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Evaluator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>


  <body>

<header>
  <h1> Resume Evaluator</h1>

  <nav><!--للتنقل بين الصفحات او في نفس الصفحه لكن ينقلني لمكان منطقة الكلام
   href=المكان الذي ينتقل إليه الرابط-->
    <a href="#">Login</a>
    <a href="#">Register</a>
  </nav>
</header>

<main>

  <section>
    <form id="my-form">
        <label for="username">Your Name</label>
        <input type="text" id="username" placeholder="Enter your name" />
       
      </form>
    
    <form id="resume-form">
      <div>
        <label for="job-desc">Job Description:</label><br>
  
    <textarea id="job-desc" placeholder="enter job Description here"></textarea>
      </div>
     
      <div>
        <label for="user-prompt">Custom Prompt:</label>
        <textarea id="user-prompt" placeholder="enter custom Prompt here "></textarea>
      
      <label for="resume-file">upload pdf file</label>
        <input 
        type="file"
        id="resume-file"
        accept=".pdf" />
        
        <button type="submit" id="evaluate" >
          evaluate
        </button>
      </div>

      </form>
      </section>
  
        <section>
         
           <h2>Result</h2>
         
          <div id="Result" >
            the result will be here
          </div>
       
        </section>
     
      </main>
          
  </body>
  <script src="script.js"></script>
  </html>
